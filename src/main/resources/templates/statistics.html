<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>消费统计 - 账本小屋</title>
    <link rel="icon" href="/Logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        * {
            font-family: "ZCOOL KuaiLe", "微软雅黑", sans-serif !important;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --pink: #e83e8c;
            --pink-dark: #c8235c;
            --pink-light: rgba(232, 62, 140, 0.1);
            --white-glass: rgba(248, 249, 250, 0.95);
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            --sidebar-bg: rgba(232, 62, 140, 0.25);
            --body-bg: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --input-bg: #ffffff;
            --table-header-bg: rgba(232, 62, 140, 0.05);
            --btn-primary: #e83e8c;
            --btn-primary-hover: #c8235c;
            --popup-bg: rgba(255,255,255,0.95);
        }
        [data-theme="dark"] {
            --pink: #ff99bb;
            --pink-dark: #ff6699;
            --pink-light: rgba(255, 153, 187, 0.2);
            --white-glass: rgba(30, 30, 40, 0.9);
            --sidebar-bg: rgba(255, 153, 187, 0.3);
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            --body-bg: #121212;
            --card-bg: rgba(30, 30, 40, 0.85);
            --text-color: #e0e0e0;
            --border-color: #444;
            --input-bg: #2a2a2a;
            --table-header-bg: rgba(255, 153, 187, 0.15);
            --btn-primary: #ff99bb;
            --btn-primary-hover: #ff6699;
            --popup-bg: rgba(40,40,55,0.98);
        }

        body {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            background-color: var(--body-bg);
            color: var(--text-color);
        }

        .page-container {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* 侧边栏样式（支持折叠） */
        .sidebar {
            width: 220px;
            background: transparent;
            backdrop-filter: blur(8px);
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: width 0.3s ease;
            overflow-x: hidden;
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            width: 60px;
        }

        .sidebar.collapsed .avatar-wrap,
        .sidebar.collapsed .username,
        .sidebar.collapsed .upload-btn,
        .sidebar.collapsed .menu,
        .sidebar.collapsed .theme-section {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .sidebar-toggle {
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            width: 24px;
            height: 48px;
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, right 0.3s;
            border: none;
            color: var(--pink);
            font-size: 18px;
            font-weight: bold;
            box-shadow: -2px 0 6px rgba(0,0,0,0.1);
        }
        .sidebar-toggle:hover {
            background: rgba(255, 255, 255, 0.8);
        }
        .sidebar.collapsed .sidebar-toggle {
            right: -12px;
        }
        .sidebar-toggle .arrow {
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .sidebar:not(.collapsed) .sidebar-toggle .arrow {
            transform: rotate(0deg);
        }
        .sidebar.collapsed .sidebar-toggle .arrow {
            transform: rotate(180deg);
        }

        .avatar-wrap {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #fff;
            margin: 30px 0 15px;
            position: relative;
            cursor: pointer;
        }
        .avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .username {
            font-size: 18px;
            margin-bottom: 10px;
            text-align: center;
        }
        .upload-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            margin: 5px;
            cursor: pointer;
        }
        .upload-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .menu {
            margin-top: 30px;
            width: 100%;
        }
        .menu a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
        }
        .menu a:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(5px);
        }
        .theme-section {
            margin-top: 20px;
            width: 100%;
            text-align: center;
        }
        .theme-label {
            font-size: 14px;
            margin-bottom: 8px;
            color: white;
            opacity: 0.8;
        }
        .theme-switcher {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        .theme-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 5px 15px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            width: 100px;
            text-align: center;
        }
        .theme-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }

        .main-content {
            flex: 1;
            padding: 20px;
            overflow: auto;
            transition: margin-left 0.3s ease;
        }

        h1 {
            text-align: center;
            color: var(--pink);
            margin-bottom: 20px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .filter-bar {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
            justify-content: center;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-group label {
            color: var(--pink);
            font-weight: bold;
        }
        .filter-group select, .filter-group input {
            height: 40px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            padding: 0 15px;
            background: var(--input-bg);
            color: var(--text-color);
            outline: none;
        }
        .btn-pink {
            background: var(--btn-primary);
            border: none;
            border-radius: 30px;
            color: white;
            padding: 8px 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-pink:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-2px);
        }
        .stats-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            justify-content: center;
        }
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            min-width: 200px;
            box-shadow: var(--shadow);
        }
        .card h3 {
            color: var(--pink);
            margin-bottom: 10px;
        }
        .card .total {
            font-size: 32px;
            font-weight: bold;
        }
        .chart-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .chart-box {
            flex: 1;
            min-width: 300px;
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        .chart-box h3 {
            text-align: center;
            color: var(--pink);
            margin-bottom: 15px;
        }
        canvas {
            max-height: 350px;
            width: 100%;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #aaa;
            font-size: 12px;
        }

        /* ========== 音乐浮层样式（右上角弹出面板） ========== */
        .music-menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 26px;
            cursor: pointer;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            transition: 0.2s;
            color: var(--pink);
        }
        .music-menu-btn:hover {
            background: rgba(255,255,255,0.85);
            transform: scale(1.05);
        }
        .music-popup {
            position: fixed;
            top: 78px;
            right: 24px;
            width: 260px;
            background: var(--popup-bg);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 16px 14px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 1001;
            display: none;
            transition: 0.2s;
        }
        .music-popup.show {
            display: block;
        }
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }
        .popup-header span {
            font-size: 16px;
            font-weight: bold;
            color: var(--pink);
        }
        .close-popup {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.7;
        }
        .close-popup:hover {
            opacity: 1;
        }
        .music-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .music-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 8px 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .music-item:hover {
            background: var(--pink-light);
            transform: translateX(3px);
        }
        .music-item.active {
            background: var(--pink);
            color: white;
        }
        .music-name {
            font-size: 14px;
            font-weight: 500;
        }
        .playing-badge {
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 2px 8px;
        }
        .player-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
            border-top: 1px solid var(--border-color);
            padding-top: 14px;
        }
        .player-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-color);
            transition: 0.2s;
        }
        .player-btn:hover {
            background: var(--pink);
            color: white;
        }
        .now-playing-hint {
            font-size: 11px;
            text-align: center;
            margin-top: 12px;
            opacity: 0.7;
        }
    </style>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
<div class="page-container">
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-toggle" id="sidebarToggle"><span class="arrow">◀</span></div>
        <div class="avatar-wrap"><img id="avatarImg" src="/images/2.png"></div>
        <div class="username" id="nickName">加载中...</div>
        <button class="upload-btn" onclick="editNickname()">修改昵称</button>
        <button class="upload-btn" onclick="document.getElementById('avatarFile').click()">更换头像</button>
        <button class="upload-btn" onclick="document.getElementById('bgFile').click()">更换背景</button>
        <input type="file" id="avatarFile" style="display:none" accept="image/*">
        <input type="file" id="bgFile" style="display:none" accept="image/*">
        <div class="menu">
            <a href="/bills/toBillsList">账单列表</a>
            <a href="/pet/petPage">饲养萌宠</a>
            <a href="/statistics/page">消费统计</a>
            <a href="/calculator">计算工具</a>
            <a href="/login/toLogin">退出登录</a>
        </div>
        <div class="theme-section">
            <div class="theme-label">🎨 主题颜色</div>
            <div class="theme-switcher">
                <button class="theme-btn" data-theme="white">亮白</button>
                <button class="theme-btn" data-theme="dark">夜黑</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <h1>📊 消费趋势统计</h1>

        <div class="filter-bar">
            <div class="filter-group">
                <label>统计维度</label>
                <select id="viewType">
                    <option value="month">月度统计</option>
                    <option value="year">年度统计</option>
                </select>
            </div>
            <div class="filter-group">
                <label>收支类型</label>
                <select id="typeFilter">
                    <option value="0">支出</option>
                    <option value="1">收入</option>
                    <option value="2">全部</option>
                </select>
            </div>
            <div class="filter-group" id="monthGroup">
                <label>选择月份</label>
                <input type="month" id="monthPicker">
            </div>
            <div class="filter-group" id="yearGroup" style="display:none;">
                <label>选择年份</label>
                <select id="yearPicker"></select>
            </div>
            <button class="btn-pink" id="queryBtn">查询</button>
        </div>

        <div class="stats-cards">
            <div class="card">
                <h3 id="cardTitle">💰 总支出</h3>
                <div class="total" id="totalAmount">0.00</div>
                <div>元</div>
            </div>
        </div>

        <div class="chart-row">
            <div class="chart-box">
                <h3 id="pieTitle">分类占比（饼图）</h3>
                <canvas id="pieChart"></canvas>
            </div>
            <div class="chart-box">
                <h3 id="trendTitle">每日/月度趋势</h3>
                <canvas id="trendChart"></canvas>
            </div>
        </div>
        <div class="footer">数据基于您的记账记录，帮助分析消费习惯</div>
    </div>
</div>

<!-- 音乐浮层组件（三首可自选） -->
<button class="music-menu-btn" id="musicMenuBtn">🎵</button>
<div class="music-popup" id="musicPopup">
    <div class="popup-header">
        <span>🎶 音乐小栈</span>
        <button class="close-popup" id="closeMusicPopup">✕</button>
    </div>
    <div class="music-list" id="musicListContainer"></div>
    <div class="player-actions">
        <button class="player-btn" id="popupPlayPauseBtn">▶ 播放</button>
        <button class="player-btn" id="popupStopBtn">⏹ 停止</button>
    </div>
    <div class="now-playing-hint" id="nowPlayingHint">未播放</div>
</div>
<audio id="globalAudio" loop preload="auto"></audio>

<script th:inline="none">
    // ========== 音乐模块：三首可自选，弹出浮层，跨页面状态同步 ==========
    const musicLibrary = [
        { id: 0, name: "🎸 夏日轻快", url: "/music/mybgm.mp3" },
        { id: 1, name: "🍃 宁静时光", url: "/music/bgm2.mp3" },
        { id: 2, name: "🎶 纯享世界", url: "/music/bgm3.mp3" }
    ];
    let currentTrackId = -1;
    let isPlaying = false;
    const audioEl = document.getElementById('globalAudio');

    // DOM 元素
    const musicMenuBtn = document.getElementById('musicMenuBtn');
    const musicPopup = document.getElementById('musicPopup');
    const closePopupBtn = document.getElementById('closeMusicPopup');
    const popupPlayPause = document.getElementById('popupPlayPauseBtn');
    const popupStop = document.getElementById('popupStopBtn');
    const nowPlayingHint = document.getElementById('nowPlayingHint');
    const musicListContainer = document.getElementById('musicListContainer');

    // 保存音乐状态到 localStorage
    function saveMusicState() {
        if (currentTrackId !== -1) {
            localStorage.setItem('music_track_id', currentTrackId);
            localStorage.setItem('music_playing', isPlaying ? 'true' : 'false');
            if (isPlaying && !audioEl.paused) {
                localStorage.setItem('music_current_time', audioEl.currentTime);
            }
        } else {
            localStorage.removeItem('music_track_id');
            localStorage.setItem('music_playing', 'false');
        }
    }

    // 恢复音乐状态
    function restoreMusicState() {
        const savedId = localStorage.getItem('music_track_id');
        const savedPlaying = localStorage.getItem('music_playing') === 'true';
        const savedTime = parseFloat(localStorage.getItem('music_current_time'));
        if (savedId !== null && musicLibrary[savedId]) {
            currentTrackId = parseInt(savedId);
            audioEl.src = musicLibrary[currentTrackId].url;
            audioEl.loop = true;
            if (savedPlaying && !isNaN(savedTime) && savedTime > 0) {
                audioEl.currentTime = savedTime;
            }
            audioEl.load();
            if (savedPlaying) {
                audioEl.play().then(() => {
                    isPlaying = true;
                    updateUIForMusic();
                }).catch(e => {
                    console.warn("自动播放被阻止", e);
                    isPlaying = false;
                    updateUIForMusic();
                });
            } else {
                isPlaying = false;
                updateUIForMusic();
            }
        } else {
            currentTrackId = -1;
            isPlaying = false;
            updateUIForMusic();
        }
        updateUIForMusic();
    }

    // 更新浮层UI
    function updateUIForMusic() {
        let listHtml = '';
        musicLibrary.forEach(track => {
            const isActive = (currentTrackId === track.id);
            listHtml += `
                <div class="music-item ${isActive ? 'active' : ''}" data-id="${track.id}">
                    <span class="music-name">${track.name}</span>
                    ${isActive && isPlaying ? '<span class="playing-badge">🎵 播放中</span>' : ''}
                    ${isActive && !isPlaying && currentTrackId === track.id ? '<span class="playing-badge">⏸ 暂停</span>' : ''}
                </div>
            `;
        });
        musicListContainer.innerHTML = listHtml;

        document.querySelectorAll('.music-item').forEach(item => {
            item.addEventListener('click', (e) => {
                const id = parseInt(item.dataset.id);
                switchToMusic(id);
            });
        });

        if (isPlaying && !audioEl.paused) {
            popupPlayPause.textContent = '⏸ 暂停';
        } else {
            popupPlayPause.textContent = '▶ 播放';
        }
        if (currentTrackId !== -1) {
            const trackName = musicLibrary[currentTrackId].name;
            if (isPlaying && !audioEl.paused) {
                nowPlayingHint.innerHTML = `🎶 正在播放：${trackName}`;
            } else {
                nowPlayingHint.innerHTML = `⏸ 已暂停：${trackName}`;
            }
        } else {
            nowPlayingHint.innerHTML = `🔇 未选择音乐`;
        }
        saveMusicState();
    }

    function switchToMusic(trackId) {
        if (currentTrackId === trackId && !audioEl.paused) return;
        if (audioEl) audioEl.pause();
        currentTrackId = trackId;
        const track = musicLibrary[trackId];
        audioEl.src = track.url;
        audioEl.loop = true;
        audioEl.load();
        audioEl.play().then(() => {
            isPlaying = true;
            updateUIForMusic();
        }).catch(err => {
            console.warn("播放失败", err);
            isPlaying = false;
            updateUIForMusic();
            alert(`“${track.name}” 播放失败，请检查网络或音乐文件路径是否正确`);
        });
    }

    function togglePlayPause() {
        if (currentTrackId === -1) {
            switchToMusic(0);
            return;
        }
        if (audioEl.paused) {
            audioEl.play().then(() => {
                isPlaying = true;
                updateUIForMusic();
            }).catch(e => console.warn);
        } else {
            audioEl.pause();
            isPlaying = false;
            updateUIForMusic();
        }
    }

    function stopMusic() {
        if (audioEl) {
            audioEl.pause();
            audioEl.currentTime = 0;
        }
        isPlaying = false;
        updateUIForMusic();
    }

    function showPopup() {
        musicPopup.classList.add('show');
        setTimeout(() => {
            document.addEventListener('click', outsideClickListener);
        }, 0);
    }
    function hidePopup() {
        musicPopup.classList.remove('show');
        document.removeEventListener('click', outsideClickListener);
    }
    function outsideClickListener(e) {
        if (!musicPopup.contains(e.target) && e.target !== musicMenuBtn) {
            hidePopup();
        }
    }

    function initMusicModule() {
        restoreMusicState();
        musicMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (musicPopup.classList.contains('show')) hidePopup();
            else showPopup();
        });
        closePopupBtn.addEventListener('click', hidePopup);
        popupPlayPause.addEventListener('click', togglePlayPause);
        popupStop.addEventListener('click', stopMusic);
        window.addEventListener('beforeunload', () => {
            if (isPlaying && !audioEl.paused) localStorage.setItem('music_current_time', audioEl.currentTime);
            saveMusicState();
        });
        setInterval(() => {
            if (isPlaying && !audioEl.paused && currentTrackId !== -1) {
                localStorage.setItem('music_current_time', audioEl.currentTime);
            }
        }, 2000);
    }

    // ========== 主题切换 ==========
    function setTheme(theme) {
        if (theme === 'white') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('site_theme', theme);
    }
    function loadTheme() {
        const saved = localStorage.getItem('site_theme');
        if (saved === 'dark') setTheme('dark');
        else setTheme('white');
    }

    // ========== 侧边栏折叠 ==========
    function initSidebarToggle() {
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebarToggle');
        const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        if (isCollapsed) sidebar.classList.add('collapsed');
        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        });
    }

    // ========== 用户信息 ==========
    function loadUserProfile() {
        $.get('/user/profile', function(res) {
            if (res.code === 200) {
                const data = res.data;
                if (data.nickname) $('#nickName').text(data.nickname);
                if (data.avatarUrl) $('#avatarImg').attr('src', data.avatarUrl);
                if (data.backgroundUrl) {
                    $('body').css({
                        'background-image': 'url(' + data.backgroundUrl + ')',
                        'background-size': 'cover',
                        'background-position': 'center'
                    });
                }
            } else if (res.code === 401) {
                window.location.href = '/login/toLogin';
            }
        }).fail(() => console.error('加载用户信息失败'));
    }

    window.editNickname = function() {
        const oldName = $('#nickName').text();
        const newName = prompt('请输入新昵称', oldName);
        if (newName && newName.trim()) {
            $.ajax({
                url: '/user/profile',
                type: 'PUT',
                contentType: 'application/json',
                data: JSON.stringify({ nickname: newName.trim() }),
                success: function(res) {
                    if (res.code === 200) {
                        $('#nickName').text(newName.trim());
                        alert('昵称修改成功');
                    } else alert(res.msg || '修改失败');
                }
            });
        }
    };

    $('#avatarFile').on('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const fd = new FormData();
        fd.append('avatar', file);
        $.ajax({
            url: '/user/avatar', type: 'POST', data: fd, processData: false, contentType: false,
            success: function(res) {
                if (res.code === 200) {
                    $('#avatarImg').attr('src', res.data.avatarUrl + '?t=' + new Date().getTime());
                    alert('头像更新成功');
                } else alert('上传失败：' + res.msg);
            }, error: () => alert('网络错误')
        });
        $(this).val('');
    });

    $('#bgFile').on('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const fd = new FormData();
        fd.append('background', file);
        $.ajax({
            url: '/user/background', type: 'POST', data: fd, processData: false, contentType: false,
            success: function(res) {
                if (res.code === 200) {
                    const bgUrl = res.data.backgroundUrl;
                    $('body').css({
                        'background-image': 'url(' + bgUrl + ')',
                        'background-size': 'cover',
                        'background-position': 'center'
                    });
                    alert('背景更新成功');
                } else alert('上传失败：' + res.msg);
            }, error: () => alert('网络错误')
        });
        $(this).val('');
    });

    // ========== 统计图表相关（原样保留） ==========
    let pieChart = null;
    let trendChart = null;

    function initYearPicker() {
        const now = new Date();
        const currentYear = now.getFullYear();
        let options = '';
        for (let y = currentYear - 2; y <= currentYear + 2; y++) {
            options += `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}年</option>`;
        }
        $('#yearPicker').html(options);
    }

    $('#viewType').change(function() {
        const val = $(this).val();
        if (val === 'month') {
            $('#monthGroup').show();
            $('#yearGroup').hide();
        } else {
            $('#monthGroup').hide();
            $('#yearGroup').show();
        }
        $('#queryBtn').click();
    });

    function loadStatistics() {
        const viewType = $('#viewType').val();
        let target = '';
        if (viewType === 'month') {
            target = $('#monthPicker').val();
            if (!target) {
                const now = new Date();
                target = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
                $('#monthPicker').val(target);
            }
        } else {
            target = $('#yearPicker').val();
        }
        const type = $('#typeFilter').val();

        if (type === '0') $('#cardTitle').text('💰 总支出');
        else if (type === '1') $('#cardTitle').text('💰 总收入');
        else $('#cardTitle').text('💰 总收支');

        $.get('/statistics/data', { viewType: viewType, target: target, type: type }, function(res) {
            if (res.code === 200) {
                const data = res.data;
                $('#totalAmount').text(data.total.toFixed(2));

                const pieData = data.pie || [];
                if (pieChart) pieChart.destroy();
                const ctxPie = document.getElementById('pieChart').getContext('2d');
                pieChart = new Chart(ctxPie, {
                    type: 'pie',
                    data: {
                        labels: pieData.map(item => item.name),
                        datasets: [{
                            data: pieData.map(item => item.value),
                            backgroundColor: ['#ff6f8b', '#78c2f1', '#91ce78', '#ffaa66', '#c39bd3', '#5dade2'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: { legend: { position: 'bottom', labels: { color: getComputedStyle(document.documentElement).getPropertyValue('--text-color') } } }
                    }
                });

                let trendLabels = [], trendValues = [];
                if (viewType === 'month') {
                    const lineData = data.line || [];
                    trendLabels = lineData.map(item => item.date.substring(5));
                    trendValues = lineData.map(item => item.amount);
                    $('#trendTitle').text('每日消费趋势（元）');
                    if (trendChart) trendChart.destroy();
                    const ctxLine = document.getElementById('trendChart').getContext('2d');
                    trendChart = new Chart(ctxLine, {
                        type: 'line',
                        data: { labels: trendLabels, datasets: [{ label: '金额', data: trendValues, borderColor: '#ff6f8b', backgroundColor: 'rgba(255,111,139,0.1)', fill: true, tension: 0.3 }] },
                        options: { responsive: true, maintainAspectRatio: true }
                    });
                } else {
                    const barData = data.bar || [];
                    trendLabels = barData.map(item => item.month + '月');
                    trendValues = barData.map(item => item.amount);
                    $('#trendTitle').text('各月消费趋势（元）');
                    if (trendChart) trendChart.destroy();
                    const ctxBar = document.getElementById('trendChart').getContext('2d');
                    trendChart = new Chart(ctxBar, {
                        type: 'bar',
                        data: { labels: trendLabels, datasets: [{ label: '金额', data: trendValues, backgroundColor: '#78c2f1', borderRadius: 10 }] },
                        options: { responsive: true, maintainAspectRatio: true }
                    });
                }
            } else if (res.code === 401) {
                alert('请先登录');
                window.location.href = '/login/toLogin';
            } else {
                alert(res.msg || '加载失败');
            }
        }).fail(() => alert('网络错误，请重试'));
    }

    $(document).ready(function() {
        loadTheme();
        initSidebarToggle();
        initMusicModule();   // 启动三首可自选音乐模块
        $('.theme-btn').click(function() {
            const theme = $(this).data('theme');
            setTheme(theme);
            loadStatistics();
        });
        loadUserProfile();
        initYearPicker();
        const now = new Date();
        const defaultMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
        $('#monthPicker').val(defaultMonth);
        $('#queryBtn').click(loadStatistics);
        loadStatistics();
    });
</script>
</body>
</html>
