<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>计算工具 · 账本小屋</title>
    <link rel="icon" href="/Logo.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "ZCOOL KuaiLe", "微软雅黑", sans-serif !important;
        }

        /* ===== 主题变量定义 ===== */
        :root {
            --pink: #e83e8c;
            --pink-dark: #c8235c;
            --pink-light: rgba(232, 62, 140, 0.1);
            --white-glass: rgba(248, 249, 250, 0.95);
            --sidebar-bg: rgba(232, 62, 140, 0.25);
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            --body-bg: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --input-bg: #ffffff;
            --btn-primary: #e83e8c;
            --btn-primary-hover: #c8235c;
            --calc-btn-bg: #f0f0f0;
            --calc-btn-text: #333;
            --calc-operator-bg: #e83e8c;
            --calc-operator-text: #fff;
            --calc-equals-bg: #78c2f1;
            --calc-equals-text: #fff;
            --calc-clear-bg: #ffaa66;
            --calc-clear-text: #fff;
            --history-bg: rgba(255, 255, 255, 0.7);
            --history-hover-bg: rgba(232, 62, 140, 0.1);
            --popup-bg: rgba(255,255,255,0.95);
        }
        [data-theme="dark"] {
            --pink: #ff99bb;
            --pink-dark: #ff6699;
            --pink-light: rgba(255, 153, 187, 0.2);
            --white-glass: rgba(30, 30, 40, 0.9);
            --sidebar-bg: rgba(255, 153, 187, 0.3);
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            --body-bg: #121212;
            --card-bg: rgba(30, 30, 40, 0.85);
            --text-color: #e0e0e0;
            --border-color: #444;
            --input-bg: #2a2a2a;
            --btn-primary: #ff99bb;
            --btn-primary-hover: #ff6699;
            --calc-btn-bg: #2a2a2a;
            --calc-btn-text: #e0e0e0;
            --calc-operator-bg: #ff99bb;
            --calc-operator-text: #121212;
            --calc-equals-bg: #78c2f1;
            --calc-equals-text: #121212;
            --calc-clear-bg: #ffaa66;
            --calc-clear-text: #121212;
            --history-bg: rgba(30, 30, 40, 0.8);
            --history-hover-bg: rgba(255, 153, 187, 0.2);
            --popup-bg: rgba(40,40,55,0.98);
        }

        body {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            background-color: var(--body-bg);
            color: var(--text-color);
        }

        .page-container {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* 侧边栏样式（支持折叠） */
        .sidebar {
            width: 220px;
            background: transparent;
            backdrop-filter: blur(8px);
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: width 0.3s ease;
            overflow-x: hidden;
            flex-shrink: 0;
        }

        .sidebar.collapsed {
            width: 60px;
        }

        .sidebar.collapsed .avatar-wrap,
        .sidebar.collapsed .username,
        .sidebar.collapsed .upload-btn,
        .sidebar.collapsed .menu,
        .sidebar.collapsed .theme-section {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .sidebar-toggle {
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            width: 24px;
            height: 48px;
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, right 0.3s;
            border: none;
            color: var(--pink);
            font-size: 18px;
            font-weight: bold;
            box-shadow: -2px 0 6px rgba(0,0,0,0.1);
        }
        .sidebar-toggle:hover {
            background: rgba(255, 255, 255, 0.8);
        }
        .sidebar.collapsed .sidebar-toggle {
            right: -12px;
        }
        .sidebar-toggle .arrow {
            display: inline-block;
            transition: transform 0.3s ease;
        }
        .sidebar:not(.collapsed) .sidebar-toggle .arrow {
            transform: rotate(0deg);
        }
        .sidebar.collapsed .sidebar-toggle .arrow {
            transform: rotate(180deg);
        }

        .avatar-wrap {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #fff;
            margin: 30px 0 15px;
            position: relative;
            cursor: pointer;
        }
        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .username { font-size: 18px; margin-bottom: 10px; text-align: center; }
        .upload-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            margin: 5px;
            cursor: pointer;
        }
        .upload-btn:hover { background: rgba(255,255,255,0.3); }
        .menu {
            margin-top: 30px;
            width: 100%;
        }
        .menu a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
        }
        .menu a:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(5px);
        }

        .theme-section {
            margin-top: 20px;
            width: 100%;
            text-align: center;
        }
        .theme-label {
            font-size: 14px;
            margin-bottom: 8px;
            color: white;
            opacity: 0.8;
        }
        .theme-switcher {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        .theme-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 5px 15px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            width: 100px;
            text-align: center;
        }
        .theme-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }

        .main-content {
            flex: 1;
            padding: 30px;
            overflow: auto;
            transition: margin-left 0.3s ease;
        }

        /* 计算器卡片 */
        .calculator-card {
            max-width: 500px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            padding: 20px 30px;
            box-shadow: var(--shadow);
        }

        .calculator-title {
            text-align: center;
            font-size: 28px;
            color: var(--pink);
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .calculator-screen {
            background: #2c3e50;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .calculator-screen input {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 36px;
            text-align: right;
            color: #fff;
            outline: none;
            font-family: monospace;
        }

        .calculator-screen .expression {
            font-size: 14px;
            color: #aaa;
            text-align: right;
            margin-top: 8px;
            min-height: 24px;
        }

        .calculator-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .calc-btn {
            background: var(--calc-btn-bg);
            border: none;
            border-radius: 30px;
            padding: 15px 0;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--calc-btn-text);
        }

        .calc-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .calc-btn:active {
            transform: translateY(0);
        }

        .calc-btn.operator {
            background: var(--calc-operator-bg);
            color: var(--calc-operator-text);
        }

        .calc-btn.equals {
            background: var(--calc-equals-bg);
            color: var(--calc-equals-text);
            grid-column: span 2;
        }

        .calc-btn.clear {
            background: var(--calc-clear-bg);
            color: var(--calc-clear-text);
        }

        .calc-btn.zero {
            grid-column: span 2;
        }

        .history-section {
            margin-top: 20px;
            background: var(--history-bg);
            border-radius: 20px;
            padding: 15px;
        }

        .history-title {
            font-size: 16px;
            color: var(--pink);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-color);
        }

        .history-item:hover {
            background: var(--history-hover-bg);
            transform: translateX(5px);
        }

        .clear-history {
            background: none;
            border: none;
            color: var(--pink);
            cursor: pointer;
            font-size: 12px;
        }

        .footer-note {
            text-align: center;
            margin-top: 10px;
            color: #888;
            font-size: 12px;
        }

        /* ========== 音乐浮层样式（右上角弹出面板） ========== */
        .music-menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 26px;
            cursor: pointer;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(8px);
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            transition: 0.2s;
            color: var(--pink);
        }
        .music-menu-btn:hover {
            background: rgba(255,255,255,0.85);
            transform: scale(1.05);
        }
        .music-popup {
            position: fixed;
            top: 78px;
            right: 24px;
            width: 260px;
            background: var(--popup-bg);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 16px 14px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 1001;
            display: none;
            transition: 0.2s;
        }
        .music-popup.show {
            display: block;
        }
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }
        .popup-header span {
            font-size: 16px;
            font-weight: bold;
            color: var(--pink);
        }
        .close-popup {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.7;
        }
        .close-popup:hover {
            opacity: 1;
        }
        .music-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .music-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 8px 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .music-item:hover {
            background: var(--pink-light);
            transform: translateX(3px);
        }
        .music-item.active {
            background: var(--pink);
            color: white;
        }
        .music-name {
            font-size: 14px;
            font-weight: 500;
        }
        .playing-badge {
            font-size: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 2px 8px;
        }
        .player-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
            border-top: 1px solid var(--border-color);
            padding-top: 14px;
        }
        .player-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-color);
            transition: 0.2s;
        }
        .player-btn:hover {
            background: var(--pink);
            color: white;
        }
        .now-playing-hint {
            font-size: 11px;
            text-align: center;
            margin-top: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="page-container">
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-toggle" id="sidebarToggle"><span class="arrow">◀</span></div>
        <div class="avatar-wrap"><img id="avatarImg" src="/images/2.png"><input type="file" id="avatarFile" style="display:none" accept="image/*"></div>
        <div class="username" id="nickName">加载中...</div>
        <button class="upload-btn" onclick="editNickname()">修改昵称</button>
        <button class="upload-btn" onclick="document.getElementById('avatarFile').click()">更换头像</button>
        <button class="upload-btn" onclick="document.getElementById('bgFile').click()">更换背景</button>
        <input type="file" id="bgFile" style="display:none" accept="image/*">
        <div class="menu">
            <a href="/bills/toBillsList">账单列表</a>
            <a href="/pet/petPage">饲养萌宠</a>
            <a href="/statistics/page">消费统计</a>
            <a href="/calculator">计算工具</a>
            <a href="/login/toLogin">退出登录</a>
        </div>
        <div class="theme-section">
            <div class="theme-label">🎨 主题颜色</div>
            <div class="theme-switcher">
                <button class="theme-btn" data-theme="white">亮白</button>
                <button class="theme-btn" data-theme="dark">夜黑</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="calculator-card">
            <div class="calculator-title">🧮 计算工具 <span style="font-size: 14px; color: #aaa;">账本小屋定制</span></div>
            <div class="calculator-screen">
                <input type="text" id="result" value="0" readonly>
                <div class="expression" id="expression"></div>
            </div>
            <div class="calculator-buttons">
                <button class="calc-btn clear" onclick="clearScreen()">AC</button>
                <button class="calc-btn" onclick="deleteLast()">⌫</button>
                <button class="calc-btn" onclick="appendPercent()">%</button>
                <button class="calc-btn operator" onclick="appendOperator('/')">÷</button>
                <button class="calc-btn" onclick="appendNumber('7')">7</button>
                <button class="calc-btn" onclick="appendNumber('8')">8</button>
                <button class="calc-btn" onclick="appendNumber('9')">9</button>
                <button class="calc-btn operator" onclick="appendOperator('*')">×</button>
                <button class="calc-btn" onclick="appendNumber('4')">4</button>
                <button class="calc-btn" onclick="appendNumber('5')">5</button>
                <button class="calc-btn" onclick="appendNumber('6')">6</button>
                <button class="calc-btn operator" onclick="appendOperator('-')">-</button>
                <button class="calc-btn" onclick="appendNumber('1')">1</button>
                <button class="calc-btn" onclick="appendNumber('2')">2</button>
                <button class="calc-btn" onclick="appendNumber('3')">3</button>
                <button class="calc-btn operator" onclick="appendOperator('+')">+</button>
                <button class="calc-btn zero" onclick="appendNumber('0')">0</button>
                <button class="calc-btn" onclick="appendDot()">.</button>
                <button class="calc-btn equals" onclick="calculate()">=</button>
            </div>
            <div class="history-section">
                <div class="history-title">📜 计算历史 <button class="clear-history" onclick="clearHistory()">清除记录</button></div>
                <div class="history-list" id="historyList"><div style="color: #aaa; text-align: center; padding: 20px;">暂无历史记录</div></div>
            </div>
        </div>
        <div class="footer-note">✨ 支持连续计算 | 点击历史可复用 ✨</div>
    </div>
</div>

<!-- 音乐浮层组件 -->
<button class="music-menu-btn" id="musicMenuBtn">🎵</button>
<div class="music-popup" id="musicPopup">
    <div class="popup-header">
        <span>🎶 音乐小栈</span>
        <button class="close-popup" id="closeMusicPopup">✕</button>
    </div>
    <div class="music-list" id="musicListContainer"></div>
    <div class="player-actions">
        <button class="player-btn" id="popupPlayPauseBtn">▶ 播放</button>
        <button class="player-btn" id="popupStopBtn">⏹ 停止</button>
    </div>
    <div class="now-playing-hint" id="nowPlayingHint">未播放</div>
</div>
<audio id="globalAudio" loop preload="auto"></audio>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script th:inline="none">
    // ========== 音乐模块：三首可自选，弹出浮层，记录状态 ==========
    const musicLibrary = [
        { id: 0, name: "🎸 夏日轻快", url: "/music/mybgm.mp3" },
        { id: 1, name: "🍃 宁静时光", url: "/music/bgm2.mp3" },
        { id: 2, name: "🎶 纯享世界", url: "/music/bgm3.mp3" }
    ];
    let currentTrackId = -1;
    let isPlaying = false;
    const audioEl = document.getElementById('globalAudio');

    // DOM 元素
    const musicMenuBtn = document.getElementById('musicMenuBtn');
    const musicPopup = document.getElementById('musicPopup');
    const closePopupBtn = document.getElementById('closeMusicPopup');
    const popupPlayPause = document.getElementById('popupPlayPauseBtn');
    const popupStop = document.getElementById('popupStopBtn');
    const nowPlayingHint = document.getElementById('nowPlayingHint');
    const musicListContainer = document.getElementById('musicListContainer');

    // 保存音乐状态到 localStorage
    function saveMusicState() {
        if (currentTrackId !== -1) {
            localStorage.setItem('music_track_id', currentTrackId);
            localStorage.setItem('music_playing', isPlaying ? 'true' : 'false');
            if (isPlaying && !audioEl.paused) {
                localStorage.setItem('music_current_time', audioEl.currentTime);
            }
        } else {
            localStorage.removeItem('music_track_id');
            localStorage.setItem('music_playing', 'false');
        }
    }

    // 恢复音乐状态
    function restoreMusicState() {
        const savedId = localStorage.getItem('music_track_id');
        const savedPlaying = localStorage.getItem('music_playing') === 'true';
        const savedTime = parseFloat(localStorage.getItem('music_current_time'));
        if (savedId !== null && musicLibrary[savedId]) {
            currentTrackId = parseInt(savedId);
            audioEl.src = musicLibrary[currentTrackId].url;
            audioEl.loop = true;
            if (savedPlaying && !isNaN(savedTime) && savedTime > 0) {
                audioEl.currentTime = savedTime;
            }
            audioEl.load();
            if (savedPlaying) {
                audioEl.play().then(() => {
                    isPlaying = true;
                    updateUIForMusic();
                }).catch(e => {
                    console.warn("自动播放被阻止", e);
                    isPlaying = false;
                    updateUIForMusic();
                });
            } else {
                isPlaying = false;
                updateUIForMusic();
            }
        } else {
            currentTrackId = -1;
            isPlaying = false;
            updateUIForMusic();
        }
        updateUIForMusic();
    }

    // 更新浮层UI
    function updateUIForMusic() {
        // 渲染音乐列表
        let listHtml = '';
        musicLibrary.forEach(track => {
            const isActive = (currentTrackId === track.id);
            listHtml += `
                <div class="music-item ${isActive ? 'active' : ''}" data-id="${track.id}">
                    <span class="music-name">${track.name}</span>
                    ${isActive && isPlaying ? '<span class="playing-badge">🎵 播放中</span>' : ''}
                    ${isActive && !isPlaying && currentTrackId === track.id ? '<span class="playing-badge">⏸ 暂停</span>' : ''}
                </div>
            `;
        });
        musicListContainer.innerHTML = listHtml;

        // 绑定点击切换音乐事件
        document.querySelectorAll('.music-item').forEach(item => {
            item.addEventListener('click', (e) => {
                const id = parseInt(item.dataset.id);
                switchToMusic(id);
            });
        });

        // 更新播放/暂停按钮文字
        if (isPlaying && !audioEl.paused) {
            popupPlayPause.textContent = '⏸ 暂停';
        } else {
            popupPlayPause.textContent = '▶ 播放';
        }
        // 更新提示文字
        if (currentTrackId !== -1) {
            const trackName = musicLibrary[currentTrackId].name;
            if (isPlaying && !audioEl.paused) {
                nowPlayingHint.innerHTML = `🎶 正在播放：${trackName}`;
            } else {
                nowPlayingHint.innerHTML = `⏸ 已暂停：${trackName}`;
            }
        } else {
            nowPlayingHint.innerHTML = `🔇 未选择音乐`;
        }
        saveMusicState();
    }

    // 切换音乐
    function switchToMusic(trackId) {
        if (currentTrackId === trackId && !audioEl.paused) return;
        if (audioEl) audioEl.pause();
        currentTrackId = trackId;
        const track = musicLibrary[trackId];
        audioEl.src = track.url;
        audioEl.loop = true;
        audioEl.load();
        audioEl.play().then(() => {
            isPlaying = true;
            updateUIForMusic();
        }).catch(err => {
            console.warn("播放失败", err);
            isPlaying = false;
            updateUIForMusic();
            alert(`“${track.name}” 播放失败，请检查网络或音乐文件路径是否正确`);
        });
    }

    // 播放/暂停当前音乐
    function togglePlayPause() {
        if (currentTrackId === -1) {
            switchToMusic(0);
            return;
        }
        if (audioEl.paused) {
            audioEl.play().then(() => {
                isPlaying = true;
                updateUIForMusic();
            }).catch(e => console.warn);
        } else {
            audioEl.pause();
            isPlaying = false;
            updateUIForMusic();
        }
    }

    // 停止音乐（重置进度）
    function stopMusic() {
        if (audioEl) {
            audioEl.pause();
            audioEl.currentTime = 0;
        }
        isPlaying = false;
        updateUIForMusic();
    }

    // 浮层控制
    function showPopup() {
        musicPopup.classList.add('show');
        setTimeout(() => {
            document.addEventListener('click', outsideClickListener);
        }, 0);
    }
    function hidePopup() {
        musicPopup.classList.remove('show');
        document.removeEventListener('click', outsideClickListener);
    }
    function outsideClickListener(e) {
        if (!musicPopup.contains(e.target) && e.target !== musicMenuBtn) {
            hidePopup();
        }
    }

    function initMusicModule() {
        restoreMusicState();
        musicMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (musicPopup.classList.contains('show')) hidePopup();
            else showPopup();
        });
        closePopupBtn.addEventListener('click', hidePopup);
        popupPlayPause.addEventListener('click', togglePlayPause);
        popupStop.addEventListener('click', stopMusic);
        window.addEventListener('beforeunload', () => {
            if (isPlaying && !audioEl.paused) localStorage.setItem('music_current_time', audioEl.currentTime);
            saveMusicState();
        });
        setInterval(() => {
            if (isPlaying && !audioEl.paused && currentTrackId !== -1) {
                localStorage.setItem('music_current_time', audioEl.currentTime);
            }
        }, 2000);
    }

    // ========== 主题切换 ==========
    function setTheme(theme) {
        if (theme === 'white') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('site_theme', theme);
    }
    function loadTheme() {
        const saved = localStorage.getItem('site_theme');
        if (saved === 'dark') setTheme('dark');
        else setTheme('white');
    }

    // ========== 侧边栏折叠 ==========
    function initSidebarToggle() {
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('sidebarToggle');
        const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        if (isCollapsed) sidebar.classList.add('collapsed');
        toggleBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        });
    }

    // ========== 用户信息 ==========
    let currentExpression = '', currentResult = '0';
    function loadUserProfile() {
        $.get('/user/profile', function(res) {
            if (res.code === 200) {
                const data = res.data;
                if (data.nickname) $('#nickName').text(data.nickname);
                if (data.avatarUrl) $('#avatarImg').attr('src', data.avatarUrl);
                if (data.backgroundUrl) $('body').css({ 'background-image': 'url(' + data.backgroundUrl + ')', 'background-size': 'cover', 'background-position': 'center' });
            } else if (res.code === 401) window.location.href = '/login/toLogin';
        }).fail(() => console.error('加载用户信息失败'));
    }
    window.editNickname = function() {
        const oldName = $('#nickName').text();
        const newName = prompt('请输入新昵称', oldName);
        if (newName && newName.trim()) {
            $.ajax({ url: '/user/profile', type: 'PUT', contentType: 'application/json', data: JSON.stringify({ nickname: newName.trim() }), success: function(res) { if (res.code === 200) { $('#nickName').text(newName.trim()); alert('昵称修改成功'); } else alert(res.msg || '修改失败'); } });
        }
    };
    $('#avatarFile').on('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const fd = new FormData(); fd.append('avatar', file);
        $.ajax({ url: '/user/avatar', type: 'POST', data: fd, processData: false, contentType: false, success: function(res) { if (res.code === 200) { $('#avatarImg').attr('src', res.data.avatarUrl + '?t=' + new Date().getTime()); alert('头像更新成功'); } else alert('上传失败：' + res.msg); }, error: () => alert('网络错误，请重试') });
        $(this).val('');
    });
    $('#bgFile').on('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const fd = new FormData(); fd.append('background', file);
        $.ajax({ url: '/user/background', type: 'POST', data: fd, processData: false, contentType: false, success: function(res) { if (res.code === 200) { const bgUrl = res.data.backgroundUrl; $('body').css({ 'background-image': 'url(' + bgUrl + ')', 'background-size': 'cover', 'background-position': 'center' }); alert('背景更新成功'); } else alert('上传失败：' + res.msg); }, error: () => alert('网络错误，请重试') });
        $(this).val('');
    });

    // ========== 计算器逻辑 ==========
    function updateDisplay() {
        if (currentResult === 'Error') { $('#result').val('错误'); $('#expression').text(''); } else { $('#result').val(currentResult); $('#expression').text(currentExpression || ''); }
    }
    function appendNumber(num) {
        if (currentResult === 'Error') { currentExpression = ''; currentResult = '0'; }
        if (currentResult === '0' && num !== '.') currentResult = num;
        else currentResult += num;
        updateDisplay();
    }
    function appendOperator(op) {
        if (currentResult === 'Error') return;
        if (currentExpression === '' && currentResult !== '0') { currentExpression = currentResult + getOpSymbol(op); currentResult = '0'; }
        else if (currentExpression !== '') { calculate(); if (currentResult !== 'Error') { currentExpression = currentResult + getOpSymbol(op); currentResult = '0'; } }
        updateDisplay();
    }
    function getOpSymbol(op) { const map = { '+': '+', '-': '-', '*': '×', '/': '÷' }; return map[op] || op; }
    function appendDot() { if (currentResult === 'Error') return; if (!currentResult.includes('.')) { currentResult += '.'; updateDisplay(); } }
    function appendPercent() { if (currentResult === 'Error') return; let num = parseFloat(currentResult); if (!isNaN(num)) { currentResult = (num / 100).toString(); updateDisplay(); } }
    function deleteLast() { if (currentResult === 'Error') { currentResult = '0'; currentExpression = ''; } else if (currentResult.length > 1) currentResult = currentResult.slice(0, -1); else currentResult = '0'; updateDisplay(); }
    function clearScreen() { currentExpression = ''; currentResult = '0'; updateDisplay(); }
    function calculate() {
        if (currentExpression === '' || currentResult === 'Error') return;
        let expr = currentExpression + currentResult;
        expr = expr.replace(/×/g, '*').replace(/÷/g, '/');
        try {
            let result = eval(expr);
            if (!isFinite(result)) throw new Error('无限值');
            result = Math.round(result * 100000000) / 100000000;
            const historyItem = currentExpression + currentResult + ' = ' + result;
            addToHistory(historyItem);
            currentExpression = ''; currentResult = result.toString(); updateDisplay();
        } catch (e) { currentResult = 'Error'; updateDisplay(); }
    }
    function addToHistory(record) {
        let history = JSON.parse(localStorage.getItem('calculator_history') || '[]');
        history.unshift(record);
        if (history.length > 20) history = history.slice(0, 20);
        localStorage.setItem('calculator_history', JSON.stringify(history));
        renderHistory();
    }
    function renderHistory() {
        const history = JSON.parse(localStorage.getItem('calculator_history') || '[]');
        const historyList = $('#historyList');
        if (history.length === 0) { historyList.html('<div style="color: #aaa; text-align: center; padding: 20px;">暂无历史记录</div>'); return; }
        let html = '';
        for (let item of history) html += `<div class="history-item" onclick="useHistory('${item.replace(/'/g, "\\'")}')">${item}</div>`;
        historyList.html(html);
    }
    window.useHistory = function(record) { const parts = record.split(' = '); if (parts.length === 2) { currentExpression = ''; currentResult = parts[1]; updateDisplay(); } };
    function clearHistory() { localStorage.removeItem('calculator_history'); renderHistory(); alert('历史记录已清除'); }
    $(document).keydown(function(e) {
        const key = e.key;
        if (/[0-9]/.test(key)) { appendNumber(key); e.preventDefault(); }
        else if (key === '.') { appendDot(); e.preventDefault(); }
        else if (key === '+' || key === '-' || key === '*' || key === '/') { appendOperator(key); e.preventDefault(); }
        else if (key === 'Enter' || key === '=') { e.preventDefault(); calculate(); updateDisplay(); }
        else if (key === 'Escape') { clearScreen(); e.preventDefault(); }
        else if (key === 'Backspace') { deleteLast(); e.preventDefault(); }
        else if (key === '%') { appendPercent(); e.preventDefault(); }
    });

    $(document).ready(function() {
        loadTheme();
        initSidebarToggle();
        initMusicModule();   // 启动音乐模块
        $('.theme-btn').click(function() { const theme = $(this).data('theme'); setTheme(theme); });
        loadUserProfile();
        renderHistory();
        updateDisplay();
    });
</script>
</body>
</html>
