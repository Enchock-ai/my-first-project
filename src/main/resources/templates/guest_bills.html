<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>游客体验 - 账单列表</title>
    <link rel="icon" href="/Logo.png">
    <style>
        /* ========== 所有样式完全保留原样 ========== */
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        * {
            font-family: "ZCOOL KuaiLe", "微软雅黑", sans-serif !important;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --pink: #e83e8c;
            --pink-dark: #c8235c;
            --pink-light: rgba(232, 62, 140, 0.1);
            --white-glass: rgba(248, 249, 250, 0.95);
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            --sidebar-bg: rgba(232, 62, 140, 0.25);
            --body-bg: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --input-bg: #ffffff;
            --table-header-bg: rgba(232, 62, 140, 0.05);
            --table-row-hover: rgba(232, 62, 140, 0.02);
            --btn-primary: #e83e8c;
            --btn-primary-hover: #c8235c;
        }
        [data-theme="dark"] {
            --pink: #ff99bb;
            --pink-dark: #ff6699;
            --pink-light: rgba(255, 153, 187, 0.2);
            --white-glass: rgba(30, 30, 40, 0.9);
            --sidebar-bg: rgba(255, 153, 187, 0.3);
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            --body-bg: #121212;
            --card-bg: rgba(30, 30, 40, 0.85);
            --text-color: #e0e0e0;
            --border-color: #444;
            --input-bg: #2a2a2a;
            --table-header-bg: rgba(255, 153, 187, 0.15);
            --table-row-hover: rgba(255, 153, 187, 0.08);
            --btn-primary: #ff99bb;
            --btn-primary-hover: #ff6699;
        }

        body {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            background-color: var(--body-bg);
            color: var(--text-color);
        }
        .page-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: 220px;
            background: transparent;
            backdrop-filter: blur(8px);
            background-color: var(--sidebar-bg);
            color: white;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .avatar-wrap {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #fff;
            margin-bottom: 15px;
        }
        .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
        .username { font-size: 18px; margin-bottom: 10px; }
        .upload-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            margin: 5px;
            cursor: pointer;
        }
        .upload-btn:hover { background: rgba(255,255,255,0.3); }
        .menu {
            margin-top: 30px;
            width: 100%;
        }
        .menu a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-align: center;
            text-decoration: none;
            transition: 0.2s;
        }
        .menu a:hover {
            background: rgba(255,255,255,0.15);
            transform: translateX(5px);
        }
        .theme-section {
            margin-top: 20px;
            width: 100%;
            text-align: center;
        }
        .theme-label {
            font-size: 14px;
            margin-bottom: 8px;
            color: white;
            opacity: 0.8;
        }
        .theme-switcher {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        .theme-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 30px;
            padding: 5px 15px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            width: 100px;
            text-align: center;
        }
        .theme-btn:hover {
            background: rgba(255,255,255,0.4);
            transform: translateY(-2px);
        }
        .main-content {
            flex: 1;
            padding: 20px;
            overflow: auto;
        }
        h1 {
            text-align: center;
            color: var(--pink);
            margin-bottom: 20px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .search-form {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }
        .form-group {
            flex: 1;
            min-width: 150px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--pink);
            font-weight: bold;
        }
        .form-group input, .form-group select {
            width: 100%;
            height: 40px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            padding: 0 15px;
            outline: none;
            background: var(--input-bg);
            color: var(--text-color);
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }
        .btn-pink {
            background: var(--btn-primary);
            border: none;
            border-radius: 30px;
            color: white;
            padding: 8px 20px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .btn-pink:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--pink);
            color: var(--pink);
        }
        .btn-outline:hover {
            background: var(--pink);
            color: white;
        }
        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: 30px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
        }
        th {
            background: var(--table-header-bg);
            color: var(--pink);
            font-weight: normal;
        }
        tr:hover {
            background: var(--table-row-hover);
        }
        .action-btn {
            padding: 4px 12px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin: 0 4px;
        }
        .edit-btn { background: #78c2f1; color: white; }
        .del-btn { background: #ff7777; color: white; }
        .pagination {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            align-items: center;
        }
        .pagination button {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 4px 12px;
            cursor: pointer;
            color: var(--text-color);
        }
        .pagination button:hover {
            background: var(--btn-primary);
            color: white;
            border-color: var(--btn-primary);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 30px;
            width: 500px;
            max-width: 90%;
            color: var(--text-color);
        }
        .modal-title {
            font-size: 24px;
            color: var(--pink);
            margin-bottom: 20px;
            text-align: center;
        }
        .modal-form-group {
            margin-bottom: 15px;
        }
        .modal-form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-color);
        }
        .modal-form-group input,
        .modal-form-group select,
        .modal-form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            outline: none;
            background: var(--input-bg);
            color: var(--text-color);
        }
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        .radio-group label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: var(--text-color);
            cursor: pointer;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="page-container">
    <div class="sidebar">
        <div class="avatar-wrap">
            <!-- 游客固定头像，可换成任意静态图片 -->
            <img id="avatarImg" src="/images/2.png">
        </div>
        <div class="username" id="nickName">游客模式</div>
        <button class="upload-btn" onclick="guestTip()">修改昵称</button>
        <button class="upload-btn" onclick="guestTip()">更换头像</button>
        <button class="upload-btn" onclick="guestTip()">更换背景</button>
        <div class="menu">
            <!-- 游客版链接指向对应的游客页面 -->
            <a href="/guest/bills">📋 账单列表</a>
            <a href="/guest/pet">🐶 饲养萌宠</a>
            <a href="/guest/calc">🧮 计算工具</a>
            <a href="/">🏠 返回首页</a>
        </div>
        <div class="theme-section">
            <div class="theme-label">🎨主题颜色</div>
            <div class="theme-switcher">
                <button class="theme-btn" data-theme="white">亮白</button>
                <button class="theme-btn" data-theme="dark">夜黑</button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <h1>📋 账单表 · 游客体验版</h1>
        <div class="search-form">
            <div class="form-row">
                <div class="form-group"><label>账单类型</label><select id="search_typeid"><option value="0">请选择</option></select></div>
                <div class="form-group"><label>开始日期</label><input type="date" id="startDate"></div>
                <div class="form-group"><label>结束日期</label><input type="date" id="endDate"></div>
            </div>
            <div class="btn-group">
                <button class="btn-pink" id="searchBtn">查询</button>
                <button class="btn-pink" id="resetBtn">重置</button>
                <button class="btn-pink" id="addBtn">添加</button>
            </div>
        </div>
        <div class="table-container">
            <table id="billTable">
                <thead><tr><th>序号</th><th>账单标题</th><th>记账时间</th><th>类型名称</th><th>金额</th><th>备注</th><th>操作</th></thead>
                <tbody id="tableBody"><tr><td colspan="7">加载中......</td></tr>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
</div>

<div id="billModal" class="modal">
    <div class="modal-content">
        <div class="modal-title" id="modalTitle">添加账单</div>
        <input type="hidden" id="editId">
        <div class="modal-form-group">
            <label>账单类型</label>
            <div id="typeRadioGroup" class="radio-group"></div>
        </div>
        <div class="modal-form-group"><label>账单标题</label><input type="text" id="title" placeholder="请输入账单标题"></div>
        <div class="modal-form-group"><label>账单时间</label><input type="datetime-local" id="billtime"></div>
        <div class="modal-form-group"><label>金额</label><input type="number" id="price" step="0.01" placeholder="请输入金额"></div>
        <div class="modal-form-group"><label>备注</label><textarea id="remark" rows="3" placeholder="请输入备注"></textarea></div>
        <div class="modal-buttons">
            <button class="btn-pink" id="submitBill">提交</button>
            <button class="btn-pink" id="closeModalBtn">取消</button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    // ========== 游客模式：所有数据前端模拟 ==========

    // 1. 模拟账单类型
    let billTypes = [
        { id: 1, name: "餐饮" },
        { id: 2, name: "购物" },
        { id: 3, name: "交通" },
        { id: 4, name: "娱乐" }
    ];

    // 2. 模拟账单数据（初始）
    let demoBills = [
        { id: 1, title: "午餐", billtime: "2025-03-15 12:00:00", typeid: 1, typeName: "餐饮", price: 45.0, remark: "麻辣烫" },
        { id: 2, title: "超市购物", billtime: "2025-03-14 18:30:00", typeid: 2, typeName: "购物", price: 120.0, remark: "零食+饮料" },
        { id: 3, title: "地铁充值", billtime: "2025-03-13 08:15:00", typeid: 3, typeName: "交通", price: 50.0, remark: "月卡" },
        { id: 4, title: "电影票", billtime: "2025-03-12 20:00:00", typeid: 4, typeName: "娱乐", price: 80.0, remark: "流浪地球3" }
    ];
    let nextId = 5;

    // 当前数据（会随增删改变化，但刷新页面重置）
    let currentBills = [...demoBills];

    // 分页变量
    let currentPage = 1;
    let pageSize = 10;
    let totalPages = 0;
    let totalCount = 0;

    // ========== 辅助函数 ==========
    function guestTip() {
        alert("游客模式下无法修改个人资料，请登录后使用完整功能。");
    }

    // 初始化类型下拉框和单选框
    function initBillTypes() {
        let selectHtml = '<option value="0">请选择</option>';
        let radioHtml = '';
        billTypes.forEach((item, idx) => {
            selectHtml += `<option value="${item.id}">${item.name}</option>`;
            radioHtml += `<label><input type="radio" name="typeid" value="${item.id}" ${idx === 0 ? 'checked' : ''}> ${item.name}</label>`;
        });
        $('#search_typeid').html(selectHtml);
        $('#typeRadioGroup').html(radioHtml);
    }

    // 过滤账单（根据类型和日期）
    function filterBills() {
        let filtered = [...currentBills];
        const typeId = $('#search_typeid').val();
        const startDate = $('#startDate').val();
        const endDate = $('#endDate').val();
        if (typeId && typeId !== '0') {
            filtered = filtered.filter(b => b.typeid == typeId);
        }
        if (startDate) {
            filtered = filtered.filter(b => b.billtime.split(' ')[0] >= startDate);
        }
        if (endDate) {
            filtered = filtered.filter(b => b.billtime.split(' ')[0] <= endDate);
        }
        return filtered;
    }

    // 渲染表格
    function renderTable(records) {
        let html = '';
        records.forEach((row, idx) => {
            html += `<tr>
                <td>${(currentPage-1)*pageSize + idx + 1}</td>
                <td>${escapeHtml(row.title)}</td>
                <td>${row.billtime}</td>
                <td>${row.typeName}</td>
                <td>${row.price}</td>
                <td>${escapeHtml(row.remark) || '-'}</td>
                <td>
                    <button class="action-btn edit-btn" onclick="openEditModal(${row.id})">修改</button>
                    <button class="action-btn del-btn" onclick="deleteBill(${row.id})">删除</button>
                </td>
            </tr>`;
        });
        $('#tableBody').html(html);
    }

    function renderPagination() {
        let html = `<span>第 ${currentPage} / ${totalPages} 页 (共 ${totalCount} 条)</span>`;
        if (totalPages > 1) {
            if (currentPage > 1) html += `<button onclick="goPage(${currentPage-1})">上一页</button>`;
            if (currentPage < totalPages) html += `<button onclick="goPage(${currentPage+1})">下一页</button>`;
        }
        $('#pagination').html(html);
    }

    function loadBills() {
        let filtered = filterBills();
        totalCount = filtered.length;
        totalPages = Math.ceil(totalCount / pageSize);
        if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
        const start = (currentPage - 1) * pageSize;
        const pagedData = filtered.slice(start, start + pageSize);
        renderTable(pagedData);
        renderPagination();
    }

    function goPage(page) {
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        loadBills();
    }

    function searchBills() { currentPage = 1; loadBills(); }
    function resetSearch() { $('#search_typeid').val('0'); $('#startDate').val(''); $('#endDate').val(''); searchBills(); }

    // 增删改模拟
    function openAddModal() {
        $('#modalTitle').text('添加账单');
        $('#editId').val('');
        $('#title').val('');
        $('#billtime').val('');
        $('#price').val('');
        $('#remark').val('');
        $('#billModal').css('display', 'flex');
    }

    window.openEditModal = function(id) {
        const bill = currentBills.find(b => b.id === id);
        if (!bill) return;
        $('#modalTitle').text('修改账单');
        $('#editId').val(bill.id);
        $('#title').val(bill.title);
        $('#billtime').val(bill.billtime.replace(' ', 'T').slice(0, 16));
        $('#price').val(bill.price);
        $('#remark').val(bill.remark);
        // 选中对应的类型单选框
        $(`input[name="typeid"][value="${bill.typeid}"]`).prop('checked', true);
        $('#billModal').css('display', 'flex');
    };

    function submitBill() {
        const id = $('#editId').val();
        const typeid = parseInt($('input[name="typeid"]:checked').val());
        const title = $('#title').val().trim();
        const billtimeRaw = $('#billtime').val();
        const price = parseFloat($('#price').val());
        const remark = $('#remark').val().trim();

        if (!title || !billtimeRaw || isNaN(price)) {
            alert("请完整填写标题、时间和金额");
            return;
        }
        const typeObj = billTypes.find(t => t.id === typeid);
        const typeName = typeObj ? typeObj.name : "未知";
        const billtime = billtimeRaw.replace('T', ' ') + ':00';

        if (id) {
            // 修改
            const index = currentBills.findIndex(b => b.id == id);
            if (index !== -1) {
                currentBills[index] = { ...currentBills[index], title, billtime, typeid, typeName, price, remark };
                alert("修改成功（游客演示）");
            }
        } else {
            // 添加
            const newId = nextId++;
            currentBills.push({ id: newId, title, billtime, typeid, typeName, price, remark });
            alert("添加成功（游客演示，刷新页面将恢复初始数据）");
        }
        closeModal();
        loadBills();
    }

    window.deleteBill = function(id) {
        if (confirm("确定删除这条账单吗？游客模式下删除不会影响真实数据。")) {
            currentBills = currentBills.filter(b => b.id !== id);
            alert("已删除（演示效果）");
            if (currentPage > 1 && $('#tableBody tr').length === 1) currentPage--;
            loadBills();
        }
    };

    function closeModal() { $('#billModal').css('display', 'none'); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;': m==='>'?'&gt;': m); }

    // 主题切换（与原版一致）
    function setTheme(theme) {
        if (theme === 'white') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('site_theme', theme);
    }
    function loadTheme() {
        const saved = localStorage.getItem('site_theme');
        if (saved === 'dark') setTheme('dark');
        else setTheme('white');
    }

    // 初始化页面
    $(document).ready(function() {
        loadTheme();
        $('.theme-btn').click(function() {
            const theme = $(this).data('theme');
            setTheme(theme);
        });
        initBillTypes();
        loadBills();
        $('#searchBtn').click(searchBills);
        $('#resetBtn').click(resetSearch);
        $('#addBtn').click(openAddModal);
        $('#submitBill').click(submitBill);
        $('#closeModalBtn').click(closeModal);
        $('#billModal').click(function(e) { if (e.target === this) closeModal(); });

        // 可选的：加载一个静态背景图片（如果你有默认背景）
        // $('body').css('background-image', 'url(/images/default-bg.jpg)');
    });
</script>
</body>
</html>
