spring:
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://127.0.0.1:3306/bills?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
      username: root
      password: 260311
      max-active: 20
      max-wait: 5000
      initial-size: 1
      filters: stat,log4j,wall
      validationQuery: SELECT 'x'
    stat-view-servlet:
      enabled: true
      login-username: root
      login-password: 260311
      url-pattern: /druid/*
  thymeleaf:
    cache: false
    enabled: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    session:
      cookie:
        max-age: -1
        http-only: true
      timeout: 30m

mybatis-plus:
  mapper-locations:
    - classpath:mapper/*Mapper.xml
  global-config:
    db-config:
      id-type: auto
    banner: true
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl